<!-- @dsCard group="Charts" -->
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Alegreya+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#0a0d0b; padding:24px; font-family:'Alegreya Sans','Segoe UI',system-ui,sans-serif; }
  .panel { background:linear-gradient(180deg,rgba(255,255,255,.015),rgba(0,0,0,.12)),rgba(46,47,40,.55); border:1px solid rgba(236,229,212,.16); border-radius:12px; padding:6px 0 10px; }
  text { font-family:'Alegreya Sans',sans-serif; fill:#b5b0a1; }
  .axis { fill:#82806f; font-size:12px; font-family:'Oswald',sans-serif; letter-spacing:.06em; }
  .cat { font-family:'Oswald',sans-serif; font-size:12.5px; letter-spacing:.18em; fill:#b5b0a1; }
  .lane { fill:#ece5d4; font-size:14.5px; font-weight:600; }
  .cad { fill:#82806f; font-size:11.5px; }
  .ml { fill:#b5b0a1; font-size:11px; font-family:'Oswald',sans-serif; }
  .grid { stroke:#2d322c; stroke-width:1; }
</style>
<div class="panel">
<svg width="760" height="260" viewBox="0 0 760 260">
  <defs>
    <linearGradient id="resist" x1="0" x2="1"><stop offset="0%" stop-color="#c2504a"/><stop offset="50%" stop-color="#3a3d38"/><stop offset="100%" stop-color="#3e9e57"/></linearGradient>
    <pattern id="hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#3987e5" opacity=".1"/><line y2="7" stroke="#3987e5" stroke-width="2" opacity=".45"/>
    </pattern>
  </defs>
  <g>
    <line x1="200" y1="30" x2="200" y2="250" class="grid"/><text x="200" y="22" text-anchor="middle" class="axis">5:00</text>
    <line x1="360" y1="30" x2="360" y2="250" class="grid"/><text x="360" y="22" text-anchor="middle" class="axis">10:00</text>
    <line x1="520" y1="30" x2="520" y2="250" class="grid"/><text x="520" y="22" text-anchor="middle" class="axis">15:00</text>
    <line x1="680" y1="30" x2="680" y2="250" class="grid"/><text x="680" y="22" text-anchor="middle" class="axis">20:00</text>
  </g>
  <rect x="16" y="44" width="18" height="4" rx="2" fill="#199e70"/><text x="42" y="49" class="cat">JUNGLE</text>
  <g><!-- spawn marker lane -->
    <text x="16" y="82" class="lane">Sinner's Sacrifice</text><text x="16" y="98" class="cad">↻ 5:00 after clear</text>
    <path d="M 296 74 L 303 81 L 296 88 L 289 81 Z" fill="#199e70" stroke="#111512" stroke-width="2"/>
    <text x="296" y="103" text-anchor="middle" class="ml">8:00</text>
  </g>
  <g><!-- duration wash lane -->
    <text x="16" y="132" class="lane">Bridge buffs</text><text x="16" y="148" class="cad">on the clock · every 5:00</text>
    <rect x="200" y="126" width="85" height="10" rx="2" fill="#c98500" opacity=".22"/>
    <path d="M 200 124 L 207 131 L 200 138 L 193 131 Z" fill="#c98500" stroke="#111512" stroke-width="2"/>
    <rect x="360" y="126" width="85" height="10" rx="2" fill="#c98500" opacity=".22"/>
    <path d="M 360 124 L 367 131 L 360 138 L 353 131 Z" fill="#c98500" stroke="#111512" stroke-width="2"/>
    <text x="200" y="153" text-anchor="middle" class="ml">5:00</text><text x="360" y="153" text-anchor="middle" class="ml">10:00</text>
  </g>
  <g><!-- resistance ramp lane -->
    <text x="16" y="182" class="lane">Guardians</text><text x="16" y="198" class="cad">resist scales 0:00 → 12:00</text>
    <rect x="40" y="174" width="384" height="14" rx="3" fill="url(#resist)" opacity=".85"/>
    <rect x="424" y="174" width="296" height="14" rx="3" fill="#3e9e57" opacity=".16"/>
    <line x1="232" y1="171" x2="232" y2="191" stroke="#111512" stroke-width="2"/>
    <text x="40" y="203" class="ml">50% resist</text><text x="232" y="203" text-anchor="middle" class="ml">0%</text><text x="424" y="203" text-anchor="end" class="ml">+50% dmg</text>
  </g>
  <g><!-- spawn window lane -->
    <text x="16" y="232" class="lane">Rift</text><text x="16" y="248" class="cad">↻ ~7:00 after clear</text>
    <rect x="392" y="224" width="64" height="14" rx="3" fill="url(#hatch)"/>
    <path d="M 424 224 L 431 231 L 424 238 L 417 231 Z" fill="#3987e5" stroke="#111512" stroke-width="2"/>
    <text x="464" y="235" class="ml">spawn window</text>
  </g>
</svg>
</div>
